services:
  backend:
    container_name: yt2mp3-backend
    image: yt2mp3-backend:latest
    build: .
    env_file: .env
    environment:
      # Phase 2B uses a WSL host venv that is intentionally unavailable in Docker.
      STEM_SEPARATION_ENABLED: "false"
    ports:
      - "127.0.0.1:8001:8000"
    restart: unless-stopped
    init: true
