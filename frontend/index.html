<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>YouTube 歌曲轉調工具</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body><main class="shell">
  <header class="page-header">
    <div>
      <p class="eyebrow">yt2mp3</p>
      <h1>YouTube 歌曲轉調工具</h1>
      <p class="lede">貼上你有權使用的 YouTube 影片網址，分析原調後選擇升降半音並輸出 MP3。</p>
    </div>
    <button id="logout" class="secondary compact" type="button">登出</button>
  </header>
  <section class="card">
    <form id="analyze-form">
      <label for="url">YouTube 網址</label>
      <div class="input-row">
        <input id="url" name="url" type="url" placeholder="https://www.youtube.com/watch?v=..." required>
        <button type="submit">分析歌曲</button>
      </div>
    </form>
    <p class="notice">請僅處理你擁有或已獲授權使用的內容。暫存檔案將於一小時後刪除。</p>
  </section>
  <nav id="phase-stepper" class="phase-stepper" aria-label="主要執行步驟">
    <button type="button" class="phase-step is-active" data-phase-step="1" aria-current="step">
      <span class="phase-number">1</span>
      <span><strong>分析與轉調</strong><small>分析原調並輸出 MP3</small></span>
    </button>
    <span class="phase-connector" aria-hidden="true"></span>
    <button type="button" class="phase-step" data-phase-step="2" disabled>
      <span class="phase-number">2</span>
      <span><strong>主旋律簡譜</strong><small>產生 Melody JSON 與 MIDI</small></span>
    </button>
  </nav>
  <section id="status" class="status hidden" aria-live="polite"></section>
  <section id="result" class="card hidden"></section>
</main>
<script src="config.js"></script>
<script src="app.js" defer></script>
</body>
</html>
