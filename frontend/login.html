<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>登入｜YouTube 歌曲轉調工具</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body><main class="shell narrow">
  <section class="card">
    <p class="eyebrow">私人工具</p>
    <h1>登入</h1>
    <p class="muted">請輸入本機服務密碼。</p>
    <form id="login-form">
      <label for="password">密碼</label>
      <input id="password" name="password" type="password" required autofocus autocomplete="current-password">
      <button class="login-submit" type="submit">進入工具</button>
    </form>
    <p id="login-status" class="status hidden" role="alert" aria-live="polite"></p>
  </section>
</main>
<script src="config.js"></script>
<script src="auth.js" defer></script>
</body>
</html>
