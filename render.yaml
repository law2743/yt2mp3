services:
  - type: web
    name: yt2mp3-frontend
    runtime: static
    plan: free
    buildCommand: bash scripts/build_frontend.sh
    staticPublishPath: ./frontend
    autoDeploy: false
    envVars:
      - key: BACKEND_API_URL
        sync: false
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: no-referrer
      - path: /*
        name: X-Frame-Options
        value: DENY
