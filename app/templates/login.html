<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>登入｜YouTube 歌曲轉調工具</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body><main class="shell narrow">
  <section class="card">
    <p class="eyebrow">私人工具</p>
    <h1>登入</h1>
    <p class="muted">請輸入服務密碼。</p>
    {% if error %}<p class="error" role="alert">密碼不正確。</p>{% endif %}
    <form method="post" action="/login">
      <label for="password">密碼</label>
      <input id="password" name="password" type="password" required autofocus>
      <button type="submit">進入工具</button>
    </form>
  </section>
</main></body>
</html>
